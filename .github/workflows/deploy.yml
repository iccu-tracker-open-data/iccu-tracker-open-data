name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_REPO_URL: ${{ secrets.GH_REPO_URL }}
      GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
      GOOGLE_SHEET_GID: ${{ secrets.GOOGLE_SHEET_GID }}
      GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
      GOOGLE_FORM_URL: ${{ secrets.GOOGLE_FORM_URL }}
      NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run generate

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
